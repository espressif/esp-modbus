workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - pre_check
  - build
  - test
  - deploy

variables:
  # System environment
  ESP_DOCS_ENV_IMAGE: "$CI_REGISTRY/ci/images/idf-v5.3-docs:1"
  TEST_DIR: "$CI_PROJECT_DIR"

include:
  - local: ".gitlab/ci/pre-check.yml"
  - local: ".gitlab/ci/build_test_pipeline.yml"
  - local: ".gitlab/ci/docs.yml"
  - local: ".gitlab/ci/deploy.yml"
  - local: ".gitlab/ci/prebuild_report.yml"
